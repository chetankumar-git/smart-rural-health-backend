# ===================================
# Smart Rural Health Link - Config
# ===================================

# Server
server.port=8080

# Database (update these for your MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/rural_health_db?useSSL=false&serverTimezone=IST&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (change this to a long random string in production)
app.jwt.secret=SmartRuralHealthLink2024SecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# CORS - allow your Vercel frontend
app.cors.allowed-origins=https://your-frontend.vercel.app,http://localhost:3000,http://localhost:5500

# App info
spring.application.name=smart-rural-health

# Logging
logging.level.com.ruralhealth=INFO
logging.level.org.springframework.security=WARN
